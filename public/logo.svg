  <rect width="1200" height="630" fill="#ffffff"/>
  <g transform="translate(110 110)">
    <rect x="0" y="0" width="980" height="410" rx="36" fill="none" stroke="#0f172a" stroke-width="12"/>
    <path d="M80 300 C200 220 270 250 360 180 C450 110 560 130 650 210 C740 290 830 260 900 190" fill="none" stroke="#0f172a" stroke-width="14" stroke-linecap="round"/>
    <circle cx="180" cy="250" r="24" fill="#0f172a"/>
    <circle cx="360" cy="180" r="24" fill="#0f172a"/>
    <circle cx="650" cy="210" r="24" fill="#0f172a"/>
