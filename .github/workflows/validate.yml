name: Validate Landscape

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Validate registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate YAML syntax
        run: |
          python - <<'PY'
          import pathlib
          import sys
          import yaml

          failed = False
          for path in pathlib.Path('.').rglob('*.yml'):
              try:
                  with path.open('r', encoding='utf-8') as f:
                      yaml.safe_load(f)
                  print(f'OK {path}')
              except Exception as exc:
                  failed = True
                  print(f'FAILED {path}: {exc}', file=sys.stderr)

          if failed:
              sys.exit(1)
          PY

      - name: Validate registry semantics
        run: python scripts/validate-registry.py

      - name: Build site
        run: python scripts/build-site.py

      - name: Export graph
        run: python scripts/export-graph.py

      - name: Verify generated graph files
        run: |
          test -s dist/landscape-graph.mmd
          test -s dist/landscape-graph.dot
