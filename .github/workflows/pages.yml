name: Publish Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build static site
        run: python scripts/build-site.py

      - name: Export relationship graph
        run: python scripts/export-graph.py

      - name: Export CSV files
        run: python scripts/export-csv.py

      - name: Build API index
        run: python scripts/build-api-index.py

      - name: Build SEO artifacts
        run: python scripts/build-seo.py

      - name: Copy registry data and generated exports
        run: |
          mkdir -p _site/data _site/docs _site/public _site/graph _site/exports
          cp -r data/* _site/data/
          cp -r docs/* _site/docs/
          cp -r public/* _site/public/
          cp dist/landscape-graph.* _site/graph/
          cp dist/*.csv _site/exports/
          cp landscape.yml _site/landscape.yml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
