        - service-desk-agent
        - revenue-operations-agent
        - journey-automation
        - case-management
        - knowledge-assist
        - human-handoff
      landscape_categories:
        - agent-runtime
        - commerce-payments
        - observability
    - id: hr-workforce
      name: HR and Workforce AI
      description: Building blocks for HR agents, employee insights, career pathing, and talent workflows.
      example_markets:
        - AI Agent Marketplace for HR
        - AI in Career Pathing
        - AI-Enabled Candidate Sourcing
        - AI-Enabled Interview Intelligence
        - AI Enabled Employee Focus Group Tools
      building_blocks:
